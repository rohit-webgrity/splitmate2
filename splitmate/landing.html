<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install SplitMate</title>
    <meta name="theme-color" content="#047857">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/logo.svg">
</head>
<body>
    <div class="container">
        <header class="landing-header">
            <img src="assets/logo.svg" alt="SplitMate Icon">
            <h1>SplitMate</h1>
            <p>The smartest way to split expenses with friends.</p>
        </header>

        <section class="features">
            <div class="feature-item">
                <span class="feature-icon">✨</span>
                <div>Clean & Minimal Interface</div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">⚡</span>
                <div>Fast & Offline Ready</div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔒</span>
                <div>Secure Data with Firebase</div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📱</span>
                <div>App-like Experience (PWA)</div>
            </div>
        </section>

        <button id="install-btn" class="btn-primary">Install SplitMate</button>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
